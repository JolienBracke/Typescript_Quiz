name: Build & test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-and-test:
    timeout-minutes: 5
    name: "Build & Test"
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v6
      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
      # Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      # Install dependencies
      - name: Install dependencies
        run: pnpm install
      # Run unit tests
      - name: Run unit tests
        run: pnpm vitest
      # Install playwright dependencies
      - name: Install playwright dependencies
        run: npx playwright install
      # Run e2e tests
      - name: Run e2e tests
        run: npx playwright test